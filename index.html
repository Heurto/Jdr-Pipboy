<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PIPBoy - Tactical R.A.D. V11.8</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        :root { --p-green: #00ff00; --p-dark: #050505; --p-warn: #ffd700; }
        body { background-color: var(--p-dark); color: var(--p-green); font-family: 'VT323', monospace; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .pipboy-container { background: rgba(0, 20, 0, 0.9); border: 2px solid var(--p-green); padding: 20px; width: 95%; max-width: 1100px; min-height: 850px; box-shadow: inset 0 0 20px #003300; position: relative; }
        .header { border-bottom: 1px solid var(--p-green); padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .screen { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .btn-import { background: var(--p-green); color: #000; padding: 15px 30px; cursor: pointer; font-size: 1.5rem; font-weight: bold; border:none; }
        #monster-search { background: transparent; border: 1px solid var(--p-green); color: var(--p-green); font-family: 'VT323'; padding: 10px; width: 80%; font-size: 1.5rem; margin-bottom: 20px; outline: none; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; }
        .card { border: 1px solid var(--p-green); background: rgba(0, 40, 0, 0.3); width: 235px; padding: 8px; text-align: center; }
        .card img { width: 100%; height: 90px; object-fit: contain; background: #000; border: 1px solid rgba(0,255,0,0.2); margin-bottom: 5px; }
        .hp-bar { height: 20px; background: #000; border: 1px solid var(--p-green); position: relative; overflow: hidden; margin: 5px 0; }
        .hp-fill { height: 100%; background: #00cc00; transition: width 0.3s; }
        .hp-text { position: absolute; width: 100%; top: 0; left: 0; font-weight: bold; line-height: 20px; z-index: 5; font-size: 0.9rem; color: #fff; text-shadow: 1px 1px 2px #000; }
        .loot-menu { display: flex; flex-direction: column; gap: 4px; margin-top: 5px; }
        .loot-btn { color: var(--p-warn) !important; border: 1px dashed var(--p-warn) !important; font-size: 0.85rem !important; padding: 4px; cursor: pointer; background: transparent; font-family: 'VT323'; }
        .loot-btn small { display: block; font-size: 0.6rem; color: var(--p-green); opacity: 0.7; }
        .equip-box { font-size: 0.75rem; color: #fff; border: 1px double var(--p-green); background: rgba(0,255,0,0.1); padding: 4px; margin-bottom: 5px; text-align: left; line-height: 1.1; }
        .log { height: 180px; overflow-y: auto; text-align: left; padding: 10px; border: 1px solid var(--p-green); width: 95%; background: #000; margin-top: 20px; font-size: 1rem; }
        button { background: transparent; color: var(--p-green); border: 1px solid var(--p-green); font-family: 'VT323'; cursor: pointer; padding: 5px 10px; text-transform: uppercase; }
        button:hover:not(:disabled) { background: var(--p-green); color: #000; }
        .played { opacity: 0.4; filter: grayscale(1); }
        .init-input { border: none; background: rgba(0,0,0,0.15); color: #000; font-weight: bold; font-family: 'VT323'; text-align: center; width: 32px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="pipboy-container">
    <div class="header">
        <span>> TACTICAL R.A.D. V11.8 - AUDIO RESTORED</span>
        <button onclick="location.reload()">REBOOT</button>
    </div>

    <div id="screen-import" class="screen">
        <label for="csv-file" class="btn-import">CHARGER (.CSV)</label>
        <input type="file" id="csv-file" style="display:none" onchange="handleFileSelect(event)">
    </div>

    <div id="screen-catalogue" class="screen" style="display:none;">
        <input type="text" id="monster-search" placeholder="FILTRER LES UNITÉS..." oninput="filterMonsters()">
        <div id="monster-list" class="grid"></div>
        <div style="margin-top: 25px; text-align: center; width: 100%;">
            <button id="btn-start" onclick="startCombat()" disabled style="font-size: 1.8rem; color:var(--p-warn); border-color:var(--p-warn);">ENGAGER LE COMBAT (<span id="count">0</span>)</button>
        </div>
    </div>

    <div id="screen-combat" class="screen" style="display:none;">
        <div style="width:100%; display:flex; justify-content:space-between; margin-bottom:15px;">
            <button onclick="sortInit()" style="background:var(--p-warn); color:#000; font-weight:bold;">TRIER PAR INITIATIVE</button>
            <button onclick="exit()" style="color:#ff4444; border-color:#ff4444;">TERMINER LA RENCONTRE</button>
        </div>
        <div id="arena" class="grid"></div>
        <div id="combat-log" class="log"></div>
    </div>

    <audio id="s-click" src="sounds/click.mp3"></audio>
    <audio id="s-vats" src="sounds/vats.mp3"></audio>
    <audio id="s-loot" src="sounds/loot.mp3"></audio>
    <audio id="s-die" src="sounds/die.mp3"></audio>
</div>

<script>
let DATABASE = [];
    let SKILLS = { f: "CHANCE", d: "SURVIE", t: "MEDECINE" };
    let squad = [];
    const CONDITIONS_LIST = ["empoisonné", "hébété", "infirme bras", "infirme jambes", "En feu", "somnolent"];

    window.addEventListener('DOMContentLoaded', (event) => {
        fetch('BESTIAIRE.csv') 
            .then(response => response.text())
            .then(data => {
                console.log("Fichier CSV détecté, chargement auto...");
                processData(data);
            })
            .catch(error => {
                console.log("Pas de chargement auto, attente d'import manuel.");
            });
    });

    function play(id) { 
        const sound = document.getElementById(id);
        if(sound) {
            sound.currentTime = 0;
            sound.play().catch(e => {});
        }
    }

    function handleFileSelect(event) {
        const reader = new FileReader();
        reader.onload = e => processData(e.target.result);
        reader.readAsText(event.target.files[0], "UTF-8");
    }

    function parseCSVLine(line) {
        const sep = line.includes(';') ? ';' : ',';
        const res = []; let cur = "", q = false;
        for (let i = 0; i < line.length; i++) {
            let c = line[i];
            if (c === '"') q = !q;
            else if (c === sep && !q) { res.push(cur.trim()); cur = ""; }
            else cur += c;
        }
        res.push(cur.trim());
        return res;
    }

    function processData(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
        DATABASE = [];
        const sLine = parseCSVLine(lines[1]);
        SKILLS.f = sLine[5] || "CHANCE";
        SKILLS.d = sLine[7] || "SURVIE";
        SKILLS.t = sLine[9] || "MÉDECINE";

        for (let i = 2; i < lines.length; i++) {
            const c = parseCSVLine(lines[i]);
            if (c[0]) {
                DATABASE.push({ 
                    name: c[0], init: parseInt(c[1])||0, hp: parseInt(c[2])||1, 
                    img: "images/"+(c[3]||"default.png"), equip: c[4]||"", 
                    f_res: c[5]||"", d_res: c[7]||"", t_res: c[9]||"" 
                });
            }
        }
        document.getElementById('screen-import').style.display = 'none';
        document.getElementById('screen-catalogue').style.display = 'flex';
        renderCatalogue();
    }

    function renderCatalogue(f = "") {
        const list = document.getElementById('monster-list'); list.innerHTML = "";
        DATABASE.filter(m => m.name.toLowerCase().includes(f.toLowerCase())).forEach(m => {
            const d = document.createElement('div'); d.className = "card";
            d.onclick = () => { 
                play('s-click');
                squad.push({ ...m, curHP: m.hp, hasPlayed: false, activeConditions: [] }); 
                document.getElementById('count').innerText = squad.length; 
                document.getElementById('btn-start').disabled = false; 
            };
            d.innerHTML = `<img src="${m.img}" onerror="this.src='https://placehold.co/200x130?text=RIP'"><p>${m.name.toUpperCase()}</p><span>${m.hp} HP</span>`;
            list.appendChild(d);
        });
    }

    function startCombat() { 
        play('s-vats');
        document.getElementById('screen-catalogue').style.display = 'none'; 
        document.getElementById('screen-combat').style.display = 'flex'; 
        renderArena(); 
    }

    function renderArena() {
        const a = document.getElementById('arena'); a.innerHTML = "";
        squad.forEach((m, i) => {
            const isDead = m.curHP <= 0;
            const div = document.createElement('div'); div.className = `card ${m.hasPlayed ? 'played' : ''}`;
            
            let loots = `<div class="loot-menu">`;
            if(m.equip) loots += `<div class="equip-box">📦 PORTÉ : ${m.equip.toUpperCase()}</div>`;
            if(m.f_res) loots += `<button class="loot-btn" onclick="triggerLoot('${m.name.replace(/'/g, "\\'")}','FOUILLE','${m.f_res.replace(/'/g, "\\'")}','${SKILLS.f}')"><small>${SKILLS.f}</small>FOUILLER POCHES</button>`;
            if(m.d_res) loots += `<button class="loot-btn" onclick="triggerLoot('${m.name.replace(/'/g, "\\'")}','EXTRACTION','${m.d_res.replace(/'/g, "\\'")}','${SKILLS.d}')"><small>${SKILLS.d}</small>SURVIE / DÉPÉÇAGE</button>`;
            loots += `</div>`;

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; background:${m.hasPlayed ? '#222' : (i===0 ? 'var(--p-warn)' : 'var(--p-green)')}; color:#000; padding:2px 5px; margin-bottom:5px;">
                    <span onclick="togglePlayed(${i})" style="cursor:pointer; font-weight:bold; font-size:0.9rem;">${m.hasPlayed ? '✔' : '>'} #${i+1} ${m.name.toUpperCase()}</span>
                    <span style="font-size:0.75rem; font-weight:bold;">INIT <input type="number" class="init-input" value="${m.init}" onchange="squad[${i}].init=parseInt(this.value);sortInit();"></span>
                </div>
                <img src="${m.img}" style="${isDead ? 'filter:grayscale(1) brightness(0.2)' : ''}">
                <div class="hp-bar"><div class="hp-fill" style="width:${(m.curHP/m.hp)*100}%"></div><div class="hp-text">${m.curHP}/${m.hp} HP</div></div>
                ${!isDead ? `<div style="display:flex; justify-content:center; gap:2px;"><button onclick="updHP(${i},-10)">-10</button><button onclick="updHP(${i},-1)">-1</button><button onclick="updHP(${i},1)">+1</button><button onclick="updHP(${i},10)">+10</button></div>` : loots}
            `;
            a.appendChild(div);
        });
    }

    function triggerLoot(n, type, rawData, skill) {
        play('s-loot');
        const log = document.getElementById('combat-log');
        const items = String(rawData).split('/').map(x => x.trim()).filter(x => x.length > 0);
        if (items.length === 0) return;
        const picked = items[Math.floor(Math.random() * items.length)];
        const html = `
            <div style="border-left:3px solid var(--p-warn); padding-left:10px; margin-bottom:8px; background:rgba(255,215,0,0.05); padding-top:5px;">
                <strong style="color:var(--p-warn)">[ ${type} : ${n.toUpperCase()} ]</strong><br>
                <span style="color:var(--p-green); font-size:1.1rem; font-weight:bold;">✅ TROUVÉ : ${picked.toUpperCase()}</span>
            </div>`;
        log.innerHTML = html + log.innerHTML;
    }

    function updHP(i, v) { 
        squad[i].curHP = Math.max(0, Math.min(squad[i].hp, squad[i].curHP + v)); 
        if(squad[i].curHP === 0) play('s-die');
        renderArena(); 
    }
    function togglePlayed(i) { play('s-click'); squad[i].hasPlayed = !squad[i].hasPlayed; renderArena(); }
    function sortInit() { squad.sort((a,b) => b.init - a.init); renderArena(); }
    function exit() { squad = []; document.getElementById('combat-log').innerHTML = ""; document.getElementById('screen-combat').style.display='none'; document.getElementById('screen-catalogue').style.display='flex'; }
    function filterMonsters() { renderCatalogue(document.getElementById('monster-search').value); }
</script>
</body>
</html>
